<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Izberi platformo – Bartog</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2117 0%, #1a3a28 50%, #0f2117 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .wrap { width: 100%; max-width: 680px; padding: 24px 16px; text-align: center; }
    .logo {
      width: 68px; height: 68px; border-radius: 16px;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; color: #fff; margin: 0 auto 12px;
    }
    .main-title { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .main-sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 36px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
    .card-link {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 18px; padding: 32px 20px; text-decoration: none;
      display: block; transition: all 0.2s;
    }
    .card-link:hover { transform: translateY(-3px); text-decoration: none; }
    .card-link.moto:hover {
      border-color: #3daa6e; background: rgba(61,170,110,0.12);
      box-shadow: 0 8px 28px rgba(46,139,87,0.2);
    }
    .card-link.avto:hover {
      border-color: #3b82f6; background: rgba(59,130,246,0.1);
      box-shadow: 0 8px 28px rgba(59,130,246,0.18);
    }
    .card-icon { font-size: 48px; margin-bottom: 14px; display: block; }
    .card-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 5px; }
    .card-sub { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.5; }
    .card-badge {
      display: inline-block; margin-top: 14px; padding: 4px 12px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-moto { background: rgba(46,139,87,0.2); color: #5dbb87; border: 1px solid rgba(46,139,87,0.35); }
    .badge-avto { background: rgba(59,130,246,0.18); color: #7cb8ff; border: 1px solid rgba(59,130,246,0.3); }
    .footer-info { margin-top: 32px; color: rgba(255,255,255,0.3); font-size: 13px; }
    .footer-info a { color: rgba(255,255,255,0.3); }
    .footer-info a:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">R</div>
    <div class="main-title">R-orders</div>
    <div class="main-sub">Izberi platformo za nadaljevanje</div>

    <div class="cards">
      <a href="{{ url_for('moto.narocila') }}" class="card-link moto">
        <span class="card-icon">🏍️</span>
        <div class="card-title">Moto platforma</div>
        <div class="card-sub">Evidenca naročil moto delov<br>R-MotoShop Ajdovščina</div>
        <div class="card-badge badge-moto"><i class="bi bi-wrench me-1"></i>Moto deli</div>
      </a>
      <a href="{{ url_for('main.dashboard') }}" class="card-link avto">
        <span class="card-icon">🚗</span>
        <div class="card-title">Bartog-Avto</div>
        <div class="card-sub">Naročila, reklamacije,<br>stranke, dostava</div>
        <div class="card-badge badge-avto"><i class="bi bi-clipboard-check me-1"></i>Avto deli</div>
      </a>
    </div>

    <div class="footer-info">
      <i class="bi bi-person-circle me-1"></i>{{ current_user.full_name }}
      &nbsp;·&nbsp;
      <a href="{{ url_for('auth.logout') }}">Odjava</a>
    </div>
  </div>
</body>
</html>
