{% extends 'base.html' %}
{% block title %}Nova reklamacija{% endblock %}

{% block breadcrumb %}
<ol class="breadcrumb mb-0 small">
  <li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Pregled</a></li>
  <li class="breadcrumb-item"><a href="{{ url_for('complaints.list_complaints') }}">Reklamacije</a></li>
  <li class="breadcrumb-item active">Nova reklamacija</li>
</ol>
{% endblock %}

{% block content %}
<div class="page-hdr">
  <h1><i class="bi bi-exclamation-triangle me-2 text-primary"></i>Nova reklamacija</h1>
</div>

<div class="card-plain">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Naslov reklamacije *</label>
      <input type="text" name="title" class="form-control" placeholder="Kratki opis reklamacije" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Stranka</label>
      <input type="text" name="customer_name" class="form-control" placeholder="Ime stranke">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Opis</label>
      <textarea name="description" class="form-control" rows="4" placeholder="Podrobnosti reklamacije…"></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Dodaj reklamacijo
      </button>
      <a href="{{ url_for('complaints.list_complaints') }}" class="btn btn-outline-secondary">Prekliči</a>
    </div>
  </form>
</div>
{% endblock %}
