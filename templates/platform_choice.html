<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Izberi platformo – R-Parts</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #0f1729 0%, #1e293b 50%, #0f1729 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .wrap { width: 100%; max-width: 760px; padding: 24px 16px; text-align: center; }
    .logo {
      width: 76px; height: 76px; border-radius: 20px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 900; color: #fff; margin: 0 auto 14px;
    }
    .title { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .sub { color: rgba(255,255,255,0.5); font-size: 15px; margin-bottom: 44px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media (max-width: 540px) { .cards { grid-template-columns: 1fr; } }
    .card-plat {
      background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.09);
      border-radius: 22px; padding: 40px 26px; text-decoration: none;
      transition: all 0.2s; display: block; cursor: pointer;
    }
    .card-plat:hover { transform: translateY(-5px); }
    .card-plat.moto:hover {
      border-color: #3daa6e; background: rgba(61,170,110,0.13);
      box-shadow: 0 10px 36px rgba(46,139,87,0.28);
    }
    .card-plat.avto:hover {
      border-color: #3b82f6; background: rgba(59,130,246,0.12);
      box-shadow: 0 10px 36px rgba(59,130,246,0.22);
    }
    .card-ico { font-size: 58px; margin-bottom: 18px; display: block; }
    .card-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .card-sub { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; }
    .card-badge {
      display: inline-block; margin-top: 18px; padding: 7px 18px;
      border-radius: 22px; font-size: 13px; font-weight: 700;
    }
    .badge-moto { background: rgba(46,139,87,0.25); color: #5dbb87; border: 1px solid rgba(46,139,87,0.4); }
    .badge-avto { background: rgba(59,130,246,0.2); color: #7cb8ff; border: 1px solid rgba(59,130,246,0.3); }
    .footer-note { margin-top: 40px; color: rgba(255,255,255,0.3); font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">R</div>
    <div class="title">R-Parts</div>
    <div class="sub">Izberi platformo za prijavo</div>

    <div class="cards">
      <!-- MOTO -->
      <a href="{{ url_for('auth.set_platform', platforma='moto') }}" class="card-plat moto">
        <span class="card-ico">🏍️</span>
        <div class="card-title">R-MotoShop</div>
        <div class="card-sub">Moto naročila, povpraševanja,<br>izposoja, servis</div>
        <div class="card-badge badge-moto"><i class="bi bi-box-arrow-in-right me-1"></i>Prijava</div>
      </a>

      <!-- AVTO -->
      <a href="{{ url_for('auth.set_platform', platforma='avto') }}" class="card-plat avto">
        <span class="card-ico">🚗</span>
        <div class="card-title">Bartog Ajdovščina</div>
        <div class="card-sub">Avto naročila, povpraševanja,<br>stranke, dostava</div>
        <div class="card-badge badge-avto"><i class="bi bi-box-arrow-in-right me-1"></i>Prijava</div>
      </a>
    </div>

    <div class="footer-note">
      <i class="bi bi-shield-lock me-1"></i>Vsaka platforma ima ločen vpogled
    </div>
  </div>
</body>
</html>
