{% extends 'base.html' %}
{% block title %}{{ naslov }}{% endblock %}

{% block breadcrumb %}
<ol class="breadcrumb mb-0 small">
  <li class="breadcrumb-item"><a href="{{ url_for('moto.narocila') }}">Moto</a></li>
  <li class="breadcrumb-item active">{{ naslov }}</li>
</ol>
{% endblock %}

{% block content %}
<div class="page-hdr">
  <h1><i class="bi {{ ikona }} me-2 text-success"></i>{{ naslov }}</h1>
</div>
<div class="card-plain text-center py-5">
  <i class="bi {{ ikona }} fs-1 text-success mb-3 d-block"></i>
  <h4>{{ naslov }}</h4>
  <p class="text-muted">{{ opis }}</p>
  <a href="{{ url_for('moto.narocila') }}" class="btn btn-outline-success mt-2">
    <i class="bi bi-arrow-left me-1"></i>Nazaj na naročila
  </a>
</div>
{% endblock %}
