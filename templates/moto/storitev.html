{% extends 'moto/base_moto.html' %}
{% block title %}{{ naslov }}{% endblock %}

{% block breadcrumb %}
<ol class="breadcrumb mb-0 small">
  <li class="breadcrumb-item"><a href="{{ url_for('moto.narocila') }}">Moto</a></li>
  <li class="breadcrumb-item active">{{ naslov }}</li>
</ol>
{% endblock %}

{% block content %}
<div class="page-hdr">
  <h1><i class="bi {{ ikona }} me-2" style="color:#2e8b57"></i>{{ naslov }}</h1>
</div>
<div style="background:#fff;border-radius:14px;padding:48px;text-align:center;box-shadow:0 1px 8px rgba(30,100,60,0.09);">
  <i class="bi {{ ikona }}" style="font-size:3rem;color:#2e8b57;display:block;margin-bottom:16px;"></i>
  <h4 style="color:#1a2e1f;">{{ naslov }}</h4>
  <p class="text-muted">{{ opis }}</p>
  <a href="{{ url_for('moto.narocila') }}" class="btn btn-moto btn-primary mt-2">
    <i class="bi bi-arrow-left me-1"></i>Nazaj na naročila
  </a>
</div>
{% endblock %}
