{% extends 'moto/base_moto.html' %}
{% block title %}Uredi naročilo{% endblock %}

{% block breadcrumb %}
<ol class="breadcrumb mb-0 small">
  <li class="breadcrumb-item"><a href="{{ url_for('moto.narocila') }}">Moto naročila</a></li>
  <li class="breadcrumb-item active">Uredi #{{ o.id }}</li>
</ol>
{% endblock %}

{% block extra_head %}
<style>
  .edit-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 1px 8px rgba(30,100,60,0.09);
    overflow: hidden;
    max-width: 680px;
  }
  .edit-card-header {
    background: linear-gradient(135deg, #1a6b3c, #2e8b57);
    padding: 18px 24px;
    color: #fff;
    font-weight: 800;
    font-size: 17px;
  }
  .form-label-moto {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 4px;
  }
  .form-control-moto {
    border: 1.5px solid #c8e6d0;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    background: #fafffe;
    width: 100%;
  }
  .form-control-moto:focus {
    border-color: #2e8b57;
    box-shadow: 0 0 0 3px rgba(46,139,87,0.1);
    outline: none;
  }
  .btn-moto-primary {
    background: #2e8b57;
    border-color: #2e8b57;
    font-weight: 700;
  }
  .btn-moto-primary:hover {
    background: #1a6b3c;
    border-color: #1a6b3c;
  }
</style>
{% endblock %}

{% block content %}
<div class="edit-card">
  <div class="edit-card-header">
    <i class="bi bi-pencil-square me-2"></i>Uredi naročilo #{{ o.id }} – {{ o.stranka }}
  </div>
  <form method="post" class="p-4">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label-moto">Ime stranke *</label>
        <input type="text" name="stranka" class="form-control form-control-moto"
               value="{{ o.stranka }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label-moto">Telefon</label>
        <input type="tel" name="telefon" class="form-control form-control-moto"
               value="{{ o.telefon or '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label-moto">Znamka motorja</label>
        <select name="znamka" class="form-select form-control-moto">
          <option value="">— izberi —</option>
          {% for b in brands %}
          <option value="{{ b }}" {% if o.znamka == b %}selected{% endif %}>{{ b }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label-moto">Model motorja</label>
        <input type="text" name="model_motorja" class="form-control form-control-moto"
               value="{{ o.model_motorja or '' }}" placeholder="npr. CBR 600, Duke 390">
      </div>
      <div class="col-md-6">
        <label class="form-label-moto">Letnik</label>
        <input type="number" name="letnik" class="form-control form-control-moto"
               value="{{ o.letnik or '' }}" min="1970" max="2030">
      </div>
      <div class="col-12">
        <label class="form-label-moto">Nadomestni del *</label>
        <textarea name="nadomestni_del" class="form-control form-control-moto" rows="3"
                  required>{{ o.nadomestni_del }}</textarea>
      </div>
      <div class="col-md-8">
        <label class="form-label-moto">Opomba</label>
        <input type="text" name="opomba" class="form-control form-control-moto"
               value="{{ o.opomba or '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label-moto">Status</label>
        <select name="status" class="form-select form-control-moto">
          {% for key, label, color in statuses %}
          <option value="{{ key }}" {% if o.status == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-moto-primary btn-primary px-4">
        <i class="bi bi-floppy me-1"></i>Shrani spremembe
      </button>
      <a href="{{ url_for('moto.narocila') }}" class="btn btn-outline-secondary">Prekliči</a>
    </div>
  </form>
</div>
{% endblock %}
